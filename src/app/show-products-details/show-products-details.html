<div class="container mt-5">
  <div class="card p-2 shadow-inherit">
    <table mat-table [dataSource]="productDetails" class="mt-4 mat-table">
      <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

      <!-- Position Column -->
      <ng-container matColumnDef="Name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{element.name}}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="Description">
        <th mat-header-cell *matHeaderCellDef>Description</th>
        <td mat-cell *matCellDef="let element">{{element.description}}</td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="Discounted Price">
        <th mat-header-cell *matHeaderCellDef>Discounted Price</th>
        <td mat-cell *matCellDef="let element">{{element.discountedPrice}}</td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="Actual Price">
        <th mat-header-cell *matHeaderCellDef>Actual Price</th>
        <td mat-cell *matCellDef="let element">{{element.actualPrice}}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
