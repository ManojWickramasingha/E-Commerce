<div class="container mt-5">
  <div class="card p-2">
    <div class="row">
      <div class="col-6">
        <form #productForm="ngForm" (ngSubmit)="addProduct(productForm)">
          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Enter Product Name here</mat-label>
            <input matInput placeholder="Product Name" [(ngModel)]="product.name" name="name"/>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Enter Product Discription here</mat-label>
            <input matInput placeholder="Product Description" [(ngModel)]="product.description" name="description"/>
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Enter Product Discounted Price here</mat-label>
            <input matInput placeholder="Product Discounted Price" [(ngModel)]="product.discountedPrice" name="discountedPrice" />
          </mat-form-field>

          <mat-form-field appearance="outline" class="w-100">
            <mat-label>Enter Product Actual Price here</mat-label>
            <input matInput placeholder="Product Actual Price" [(ngModel)]="product.actualPrice" name="actualPrice"/>
          </mat-form-field>

          <div class="d-flex justify-content-end">
            <button matFab extended>Cancel</button>
            <button type="submit" matFab extended class="ms-2">Add Product</button>
          </div>

        </form>

      </div>
      <div class="col-6">Image</div>
    </div>
  </div>
</div>
