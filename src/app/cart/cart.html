<div class="container mt-5">
  <div align="right" class="mb-3">
    <button (click)="checkOut(true,0)" class="btn btn-primary">checkOut</button>
  </div>

  <div>
    <table mat-table [dataSource]="cartDetails" class="mat-elevation-z8">
      <!--- Note that these columns can be defined in any order.
        The actual rendered columns are set as a property on the row definition" -->

      <!-- Position Column -->
      <ng-container matColumnDef="id">
        <th mat-header-cell *matHeaderCellDef>Id</th>
        <td mat-cell *matCellDef="let element">{{ element.id }}</td>
      </ng-container>

      <!-- Name Column -->
      <ng-container matColumnDef="name">
        <th mat-header-cell *matHeaderCellDef>Name</th>
        <td mat-cell *matCellDef="let element">{{ element.product.name }}</td>
      </ng-container>

      <!-- Weight Column -->
      <ng-container matColumnDef="discription">
        <th mat-header-cell *matHeaderCellDef>Discription</th>
        <td mat-cell *matCellDef="let element">{{ element.product.description }}</td>
      </ng-container>

      <!-- Symbol Column -->
      <ng-container matColumnDef="discounted Price">
        <th mat-header-cell *matHeaderCellDef>Discounted Price</th>
        <td mat-cell *matCellDef="let element">{{ element.product.discountedPrice }}</td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>
    </table>
  </div>
</div>
