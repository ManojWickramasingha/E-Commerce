<div class="container mt-5">
  <mat-grid-list cols="4" rowHeight="2:3" gutterSize="10">
    @if(productDetailsList.length === 0){
      <p>Product Loading...</p>
    }
    @for (product of productDetailsList; track product.id) {
       <mat-grid-tile>
          <div class="row p-5">
            <div class="image-container">
               <img class="product-deatails" [src]="product.productImages[0].url" alt="image">
            </div>
           
            <div class="mt-3">
               <p><b>{{ product.name }}</b></p> 
            </div>
            <div class="mt-2 description" >
              <p>{{ product.description }}</p>
            </div>
            <div class="mt-2">
              <p> <b>Rs.{{ product.discountedPrice }}</b> &nbsp; <b>{{ product.actualPrice }}</b></p>
            </div>
            <div class="mt-2">
               <button matButton="filled">View Details</button>
            </div>
          </div>
       </mat-grid-tile>
    }
   
  </mat-grid-list>
</div>
