<div class="container mt-5">
  <div class="card" style="padding: 20px">
    <form #loginForm="ngForm" (submit)="login(loginForm)">

      <mat-form-field appearance="outline" class="w-100 mb-3">
        <mat-label>Enter Username here</mat-label>
        <input type="text" name="username" id="username" ngModel matInput placeholder=" Username" />
        <mat-hint>username</mat-hint>
      </mat-form-field>

      <mat-form-field appearance="outline" class="w-100 mb-3">
        <mat-label>Enter userPassword here</mat-label>
        <input type="password" name="userPassword" id="userPassword" ngModel matInput placeholder=" Password" />
        <mat-hint>userPassword</mat-hint>
      </mat-form-field>

       
      
      
      <input
        type="submit"
        value="Login"
        class="btn btn-outline-primary form-control rounded-0"
      />
    </form>
  </div>
</div>
